<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | DSA Learning Analytics</title>

<style>

body{
font-family: Inter, sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
background:#667eea;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#5563d1;
}

.toggle{
text-align:center;
margin-top:15px;
font-size:14px;
cursor:pointer;
color:#667eea;
}

</style>

</head>

<body>

<div class="container">

<h2 id="title">Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="submitForm()">Login</button>

<div class="toggle" onclick="toggleMode()">
Don't have an account? Sign up
</div>

</div>

<script>

const API_BASE = "https://dsa-learning-analytics-dashboard.onrender.com"

let isLogin = true

function toggleMode(){

isLogin = !isLogin

document.getElementById("title").innerText = isLogin ? "Login" : "Sign Up"

document.querySelector("button").innerText = isLogin ? "Login" : "Sign Up"

document.querySelector(".toggle").innerText =
isLogin ? "Don't have an account? Sign up" : "Already have an account? Login"

}

async function submitForm(){

const username = document.getElementById("username").value
const password = document.getElementById("password").value

const endpoint = isLogin ? "/login" : "/signup"

const res = await fetch(`${API_BASE}${endpoint}`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username,
password
})

})

const data = await res.json()

if(res.ok){

localStorage.setItem("user_id",data.user_id)

window.location.href = "index.html"

}else{

alert("Login failed")

}

}

</script>

</body>
</html>
